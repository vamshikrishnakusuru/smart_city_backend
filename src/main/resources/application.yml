server:
  port: 8080

spring:
  application:
    name: smart-city-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:${MYSQL_URL:${DATABASE_URL:jdbc:mysql://localhost:3306/smart_city_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}}}
    username: ${SPRING_DATASOURCE_USERNAME:${MYSQLUSER:root}}
    password: ${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD:2400032707}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

app:
  cors:
    allowed-origin-patterns:
      - https://smart-city-management-one.vercel.app
      - https://*.vercel.app
      - http://localhost:*
  jwt:
    expiration: ${APP_JWT_EXPIRATION:86400000}
    secret: ${JWT_SECRET:${APP_JWT_SECRET:VGhpc0lzQVN0cm9uZ0RldmVsb3BtZW50SldUU2VjcmV0S2V5Rm9yU21hcnRDaXR5QXBwMTIzNDU2Nzg5MA==}}

management:
  endpoints:
    web:
      exposure:
        include: health

server:
  port: 8080

spring:
  application:
    name: smart-city-backend
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:smart_city_db}?ssl-mode=REQUIRED
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 25
  jackson:
    serialization:
      write-dates-as-timestamps: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,https://smart-city-management-one.vercel.app}
  jwt:
    expiration: 86400000
    secret: ${JWT_SECRET:VGhpc0lzQVN0cm9uZ0RldmVsb3BtZW50SldUU2VjcmV0S2V5Rm9yU21hcnRDaXR5QXBwMTIzNDU2Nzg5MA==}

management:
  endpoints:
    web:
      exposure:
        include: health
